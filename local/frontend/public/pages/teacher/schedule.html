<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule — Unispace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/Teacher_base.css">
</head>
<body>

    <!-- decorative illustration -->
<div class="deco-illustration">
    <img src="../../assets/images/book.png" alt="">
</div>

<div class="page-wrapper">
    <div class="app-box">

        <!-- sidebar -->
        <aside class="sidebar">

            <div class="sidebar-brand">
                <img src="../../assets/images/logo.png" alt="Unispace" class="sidebar-logo">
            
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="classes.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                    </svg>
                    <span>My Classes</span>
                </a>
                <a href="create-class.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    <span>New Class</span>
                </a>
                <a href="schedule.html" class="nav-link active">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                    <span>Schedule</span>
                </a>
                <a href="class-info.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                    <span>Class Info</span>
                </a>
                <a href="archive.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <polyline points="21 8 21 21 3 21 3 8"/>
                        <rect x="1" y="3" width="22" height="5" rx="1"/>
                        <path d="M10 12h4"/>
                    </svg>
                    <span>Archive</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="teacher-avatar" id="sidebar-avatar"></div>
                <div class="teacher-info">
                    <span class="teacher-name" id="teacher-name"></span>
                    <span class="teacher-role">Teacher</span>
                </div>
                <button class="logout-link" title="Sign out" onclick="openSignoutPopup()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                </button>
            </div>

        </aside>

        <!-- main content -->
        <main class="main-content">

            <header class="topbar">
                <div class="topbar-left">
                    <p id="welcome-msg"></p>
                    <h1>Schedule</h1>
                </div>
                <div class="topbar-right">
                    <span class="current-date" id="today-date"></span>
                    <div class="topbar-avatar-wrap" id="avatar-wrap">
                        <div class="topbar-avatar" id="topbar-avatar" onclick="toggleDropdown(event)" title="Account"></div>
                        <div class="avatar-dropdown" id="avatar-dropdown">
                            <div class="dropdown-header">
                                <div class="dropdown-header-avatar" id="dropdown-avatar"></div>
                                <div class="dropdown-header-info">
                                    <span class="dropdown-header-name" id="dropdown-name"></span>
                                    <span class="dropdown-header-role">Teacher</span>
                                </div>
                            </div>
                            <a href="profile.html" class="dropdown-item">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                                View Profile
                            </a>
                            <a href="settings.html" class="dropdown-item">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                                Settings
                            </a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-body">
                <div class="page-content">

                    <div class="toolbar-row">
                        <p class="count-label">Total slots: <strong id="slot-count">0</strong></p>
                        <button class="btn-primary" id="open-modal-btn">+ Add Slot</button>
                    </div>

                    <div class="slot-list" id="slot-list">
                        <div class="empty-state" id="empty-state">
                            <div class="empty-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                            </div>
                            <p>No schedule slots yet.</p>
                            <button class="btn-outline" id="add-first-btn" style="margin-top:4px;">Add your first slot</button>
                        </div>
                    </div>

                </div>
            </div>

        </main>

    </div>
</div>


<!-- add slot modal -->
<div class="modal-overlay" id="slot-modal" style="display:none;" onclick="handleModalBackdrop(event)">
    <div class="modal-box">

        <div class="modal-header">
            <h3 id="modal-title">Add Schedule Slot</h3>
            <button class="modal-close-btn" onclick="closeModal()">✕</button>
        </div>

        <div class="form-group">
            <label for="pick-class">Class</label>
            <select id="pick-class">
                <option value="">Select a class...</option>
            </select>
            <div id="no-classes-msg" style="display:none; font-size:12px; color:#ff6b6b; margin-top:4px;">
                No classes available. <a href="create-class.html" style="color:#ff6b6b; text-decoration:underline; cursor:pointer;">Create one first</a>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="pick-day">Day</label>
                <select id="pick-day">
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                    <option>Sunday</option>
                </select>
            </div>
            <div class="form-group">
                <label for="pick-time">Time</label>
                <input type="time" id="pick-time">
            </div>
        </div>

        <div class="form-group">
            <label for="room-no">Room</label>
            <div class="input-wrap">
                <input type="text" id="room-no" placeholder="e.g. Room 301">
            </div>
        </div>

        <div class="form-actions">
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" id="save-slot-btn">Save Slot</button>
        </div>

    </div>
</div>


<!-- signout popup -->
<div class="modal-overlay" id="signout-overlay" style="display:none;" onclick="handleSignoutBackdrop(event)">
    <div class="signout-box">
        <div class="signout-icon-wrap">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1e3a52" stroke-width="1.8" stroke-linecap="round">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
        </div>
        <h3>Sign out?</h3>
        <p>Are you sure you want to sign out?</p>
        <div class="signout-actions">
            <button class="btn-secondary" onclick="closeSignoutPopup()">Cancel</button>
            <button class="btn-danger" onclick="doSignout()">Yes, sign out</button>
        </div>
    </div>
</div>


<script>

    var fullName = localStorage.getItem('teacher_fullName') || 'Teacher';
    var initial  = fullName.charAt(0).toUpperCase();
    document.getElementById('teacher-name').textContent   = fullName;
    document.getElementById('sidebar-avatar').textContent = initial;
    document.getElementById('topbar-avatar').textContent  = initial;
    document.getElementById('dropdown-avatar').textContent = initial;
    document.getElementById('dropdown-name').textContent   = fullName;
    document.getElementById('welcome-msg').textContent    = 'Welcome back, ' + fullName;

    /* avatar dropdown */
    var dropdownEl = document.getElementById('avatar-dropdown');
    var avatarEl   = document.getElementById('topbar-avatar');
    var isOpen     = false;
    function toggleDropdown(e) { e.stopPropagation(); isOpen ? closeDropdown() : openDropdown(); }
    function openDropdown()  { isOpen = true;  dropdownEl.classList.add('visible');    avatarEl.classList.add('open'); }
    function closeDropdown() { isOpen = false; dropdownEl.classList.remove('visible'); avatarEl.classList.remove('open'); }
    document.addEventListener('click', function(e) { if (isOpen && !document.getElementById('avatar-wrap').contains(e.target)) closeDropdown(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && isOpen) closeDropdown(); });

    var API   = 'http://localhost:3000/api/classrooms';
    var token = localStorage.getItem('token') || '';

    var currentUserId = localStorage.getItem('userId');
    var classes   = [];
    var schedules = JSON.parse(localStorage.getItem('us_sch_' + currentUserId) || '[]');

    var palette = [
        '#1565C0', '#1976D2', '#1E88E5', '#2196F3',
        '#42A5F5', '#64B5F6', '#90CAF9', '#BBDEFB'
    ];

    function color(i) { return palette[i % palette.length]; }

    function save() {
        localStorage.setItem('us_sch_' + currentUserId, JSON.stringify(schedules));
    }

    function activeClasses() {
        return classes.filter(function(c) { return !c.archived; });
    }

    function loadClasses() {
        if (!token) {
            renderSlots();
            return;
        }
        fetch(API + '/my-classes', {
            headers: { Authorization: 'Bearer ' + token }
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            classes = Array.isArray(data) ? data : [];
            renderSlots();
        })
        .catch(function() {
            renderSlots();
        });
    }

    document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    function renderSlots() {
        var list  = document.getElementById('slot-list');
        var empty = document.getElementById('empty-state');

        document.getElementById('slot-count').textContent = schedules.length;

        // clear and redraw
        list.querySelectorAll('.slot-row').forEach(function(el) { el.remove(); });

        if (schedules.length === 0) {
            empty.style.display = 'flex';
            return;
        }

        empty.style.display = 'none';

        schedules.forEach(function(slot, i) {
            var match = classes.find(function(c) { return String(c._id) === String(slot.classId); });
            var name  = match ? match.course : 'Unknown';

            var row = document.createElement('div');
            row.className = 'slot-row';
            row.innerHTML =
                '<div class="slot-color-strip" style="background:' + color(i) + '"></div>' +
                '<div class="slot-details">' +
                    '<strong>' + name + '</strong>' +
                    '<span>' + slot.day + ' · ' + slot.time + (slot.room ? ' · ' + slot.room : '') + '</span>' +
                '</div>' +
                '<button class="slot-edit-btn" data-index="' + i + '" title="Edit slot">' +
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">' +
                '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>' +
                '<path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>' +
                '</svg>' +
                '</button>' +
                '<button class="slot-remove-btn" data-index="' + i + '">✕</button>';
            list.insertBefore(row, empty);
        });
    }

    // fill the class dropdown when opening the modal
    function fillClassDropdown() {
        var dropdown = document.getElementById('pick-class');
        var msg      = document.getElementById('no-classes-msg');
        var active   = activeClasses();

        dropdown.innerHTML = '<option value="">Select a class...</option>';
        
        if (active.length === 0) {
            msg.style.display = 'block';
        } else {
            msg.style.display = 'none';
            active.forEach(function(cls) {
                var opt = document.createElement('option');
                opt.value       = cls._id;
                opt.textContent = cls.course;
                dropdown.appendChild(opt);
            });
        }
    }

    function editSlot(index) {
        editingIndex = index;
        var slot = schedules[index];
        
        fillClassDropdown();
        
        document.getElementById('pick-class').value = slot.classId;
        document.getElementById('pick-day').value = slot.day;
        document.getElementById('pick-time').value = slot.time;
        document.getElementById('room-no').value = slot.room || '';
        document.getElementById('modal-title').textContent = 'Edit Schedule Slot';
        document.getElementById('save-slot-btn').textContent = 'Update Slot';
        
        openModal();
    }

    function openModal() {
  
        fillClassDropdown();
        
        if (editingIndex === null) {
            // Reset form for adding new slot
            document.getElementById('pick-class').value = '';
            document.getElementById('pick-day').value = 'Monday';
            document.getElementById('pick-time').value = '';
            document.getElementById('room-no').value = '';
            document.getElementById('modal-title').textContent = 'Add Schedule Slot';
            document.getElementById('save-slot-btn').textContent = 'Save Slot';
        }
        var el = document.getElementById('slot-modal');
        el.style.display = 'flex';
        setTimeout(function() { el.classList.add('visible'); }, 10);
    }

    function closeModal() {
        editingIndex = null;
        var el = document.getElementById('slot-modal');
        el.classList.remove('visible');
        setTimeout(function() { el.style.display = 'none'; }, 230);
    }

    function handleModalBackdrop(e) {
        if (e.target === document.getElementById('slot-modal')) closeModal();
    }

    document.getElementById('open-modal-btn').onclick = openModal;
    document.getElementById('add-first-btn').onclick  = openModal;

    var editingIndex = null;

    document.getElementById('save-slot-btn').onclick = function() {
        var classId = document.getElementById('pick-class').value;
        var day     = document.getElementById('pick-day').value;
        var time    = document.getElementById('pick-time').value;
        var room    = document.getElementById('room-no').value.trim();

        if (!classId || !time) {
            alert('Please select a class and set a time.');
            return;
        }

        if (editingIndex !== null) {
            // Update existing slot
            schedules[editingIndex] = { classId: classId, day: day, time: time, room: room };
            editingIndex = null;
        } else {
            // Add new slot
            schedules.push({ classId: classId, day: day, time: time, room: room });
        }
        save();
        closeModal();
        renderSlots();
    };

    // edit slot
    document.addEventListener('click', function(e) {
        var editBtn = e.target.closest('.slot-edit-btn');
        if (editBtn) {
            var idx = parseInt(editBtn.dataset.index);
            editSlot(idx);
            return;
        }

        var removeBtn = e.target.closest('[data-index].slot-remove-btn');
        if (removeBtn) {
            var idx = parseInt(removeBtn.dataset.index);
            schedules.splice(idx, 1);
            save();
            renderSlots();
        }
    });

    // signout popup
    function openSignoutPopup() {
        var el = document.getElementById('signout-overlay');
        el.style.display = 'flex';
        setTimeout(function() { el.classList.add('visible'); }, 10);
    }

    function closeSignoutPopup() {
        var el = document.getElementById('signout-overlay');
        el.classList.remove('visible');
        setTimeout(function() { el.style.display = 'none'; }, 230);
    }

    function handleSignoutBackdrop(e) {
        if (e.target === document.getElementById('signout-overlay')) closeSignoutPopup();
    }

    function doSignout() {
        localStorage.removeItem('token');
        localStorage.removeItem('us_user');
        window.location.href = '../index.html';
    }

    loadClasses();

</script>

</body>
</html>
