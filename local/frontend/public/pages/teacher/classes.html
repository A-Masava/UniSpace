<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Classes — Unispace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/Teacher_base.css">
</head>
<body>

<div class="page-wrapper">
    <div class="app-box">

        <!-- sidebar -->
        <aside class="sidebar">

            <div class="sidebar-brand">
                <img src="../../assets/images/logo.png" alt="Unispace" class="sidebar-logo">
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="classes.html" class="nav-link active">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                    </svg>
                    <span>My Classes</span>
                </a>
                <a href="create-class.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    <span>New Class</span>
                </a>
                <a href="schedule.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                    <span>Schedule</span>
                </a>
                <a href="class-info.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                    <span>Class Info</span>
                </a>
                <a href="archive.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <polyline points="21 8 21 21 3 21 3 8"/>
                        <rect x="1" y="3" width="22" height="5" rx="1"/>
                        <path d="M10 12h4"/>
                    </svg>
                    <span>Archive</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="teacher-avatar" id="sidebar-avatar"></div>
                <div class="teacher-info">
                    <span class="teacher-name" id="teacher-name"></span>
                    <span class="teacher-role">Teacher</span>
                </div>
                <button class="logout-link" title="Sign out" onclick="openSignoutPopup()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                </button>
            </div>

        </aside>

        <!-- main content -->
        <main class="main-content">

            <header class="topbar">
                <div class="topbar-left">
                    <p id="welcome-msg"></p>
                    <h1>My Classes</h1>
                </div>
                <div class="topbar-right">
                    <span class="current-date" id="today-date"></span>
                    <div class="topbar-avatar-wrap" id="avatar-wrap">
                        <div class="topbar-avatar" id="topbar-avatar" onclick="toggleDropdown(event)" title="Account"></div>
                        <div class="avatar-dropdown" id="avatar-dropdown">
                            <div class="dropdown-header">
                                <div class="dropdown-header-avatar" id="dropdown-avatar"></div>
                                <div class="dropdown-header-info">
                                    <span class="dropdown-header-name" id="dropdown-name"></span>
                                    <span class="dropdown-header-role">Teacher</span>
                                </div>
                            </div>
                            <a href="profile.html" class="dropdown-item">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                                View Profile
                            </a>
                            <a href="settings.html" class="dropdown-item">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                                Settings
                            </a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-body">
                <div class="page-content">

                    <div class="toolbar-row">
                        <p class="count-label">Active classes: <strong id="active-count">0</strong></p>
                        <a href="create-class.html" class="btn-primary">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            New Class
                        </a>
                    </div>

                    <div class="class-grid" id="class-grid">
                        <div class="empty-state" id="empty-state">
                            <div class="empty-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                                </svg>
                            </div>
                            <p>No classes yet.</p>
                            <a href="create-class.html" class="btn-outline" style="margin-top:4px;">Create your first class</a>
                        </div>
                    </div>

                </div>
            </div>

        </main>

    </div>
</div>


<!-- archive confirmation popup -->
<div class="modal-overlay" id="confirm-overlay" style="display:none;" onclick="handleBackdropClick(event)">
    <div class="modal-box small-modal">
        <div class="modal-header">
            <h3 id="confirm-title">Archive Class</h3>
            <button class="modal-close-btn" onclick="closeConfirm()">✕</button>
        </div>
        <p id="confirm-msg" style="font-size:13px; color:#8a7868; line-height:1.6; margin-bottom:22px;"></p>
        <div class="form-actions">
            <button class="btn-secondary" onclick="closeConfirm()">Cancel</button>
            <button class="btn-danger" id="confirm-ok-btn">Archive</button>
        </div>
    </div>
</div>

<!-- signout popup -->
<div class="modal-overlay" id="signout-overlay" style="display:none;" onclick="handleSignoutBackdrop(event)">
    <div class="signout-box">
        <div class="signout-icon-wrap">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1e3a52" stroke-width="1.8" stroke-linecap="round">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
        </div>
        <h3>Sign out?</h3>
        <p>Are you sure you want to sign out?</p>
        <div class="signout-actions">
            <button class="btn-secondary" onclick="closeSignoutPopup()">Cancel</button>
            <button class="btn-danger" onclick="doSignout()">Yes, sign out</button>
        </div>
    </div>
</div>


<script>

    var API   = 'http://localhost:3000/api/classrooms';
    var token = localStorage.getItem('token') || '';

    var fullName = localStorage.getItem('teacher_fullName') || 'Teacher';
    var initial  = fullName.charAt(0).toUpperCase();
    document.getElementById('teacher-name').textContent   = fullName;
    document.getElementById('sidebar-avatar').textContent = initial;
    document.getElementById('topbar-avatar').textContent  = initial;
    document.getElementById('dropdown-avatar').textContent = initial;
    document.getElementById('dropdown-name').textContent   = fullName;
    document.getElementById('welcome-msg').textContent    = 'Welcome back, ' + fullName;

    /* avatar dropdown */
    var dropdownEl = document.getElementById('avatar-dropdown');
    var avatarEl   = document.getElementById('topbar-avatar');
    var isOpen     = false;
    function toggleDropdown(e) { e.stopPropagation(); isOpen ? closeDropdown() : openDropdown(); }
    function openDropdown()  { isOpen = true;  dropdownEl.classList.add('visible');    avatarEl.classList.add('open'); }
    function closeDropdown() { isOpen = false; dropdownEl.classList.remove('visible'); avatarEl.classList.remove('open'); }
    document.addEventListener('click', function(e) { if (isOpen && !document.getElementById('avatar-wrap').contains(e.target)) closeDropdown(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && isOpen) closeDropdown(); });

    var palette = [
        '#a9c1cc', '#93b1be', '#7da0af', '#678fa1',
        '#587c8d', '#4b6a78', '#3d5863', '#2f454e'
    ];

    function color(i) { return palette[i % palette.length]; }

    function initials(name) {
        return name.split(' ').map(function(w) { return w[0] || ''; }).join('').toUpperCase().slice(0, 2);
    }

    document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    /* ── Load classes from MongoDB ── */
    function loadClasses() {
        if (!token) { renderClasses([]); return; }
        fetch(API + '/my-classes', {
            headers: { Authorization: 'Bearer ' + token }
        })
        .then(function(r) { return r.json(); })
        .then(function(data) { renderClasses(Array.isArray(data) ? data : []); })
        .catch(function() { renderClasses([]); });
    }

    function renderClasses(list) {
        var grid  = document.getElementById('class-grid');
        var empty = document.getElementById('empty-state');

        document.getElementById('active-count').textContent = list.length;
        grid.querySelectorAll('.class-card').forEach(function(el) { el.remove(); });

        if (list.length === 0) { empty.style.display = 'flex'; return; }
        empty.style.display = 'none';

        list.forEach(function(cls, i) {
            var card = document.createElement('div');
            card.className = 'class-card';
            card.style.cursor = 'pointer';
            card.addEventListener('click', function(e) {
                if (!e.target.closest('.card-menu-wrap')) {
                    window.location.href = 'class-students.html?id=' + cls._id;
                }
            });

            var studentCount = (cls.students && cls.students.length) || 0;
            card.innerHTML =
                '<div class="class-card-top" style="background:' + color(i) + '">' +
                    '<div class="class-initials">' + initials(cls.course) + '</div>' +
                    '<div class="card-menu-wrap">' +
                        '<button class="three-dot-btn" data-id="' + cls._id + '">⋯</button>' +
                        '<div class="card-dropdown" id="menu-' + cls._id + '">' +
                            '<button data-action="archive" data-id="' + cls._id + '">📦 Archive</button>' +
                            '<button onclick="window.location.href=\'class-info.html?id=' + cls._id + '\'">ℹ️ View Info</button>' +
                            '<button onclick="window.location.href=\'class-students.html?id=' + cls._id + '\'">👥 Students (' + studentCount + ')</button>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="class-card-body">' +
                    '<h3>' + cls.course + '</h3>' +
                    '<p class="class-meta">' + cls.dept + ' · Batch ' + cls.batch + ' · Sec ' + cls.section + '</p>' +
                    '<p class="class-id-range">Code: <strong>' + cls.classCode + '</strong></p>' +
                    '<div class="class-status-row">' +
                        '<span class="status-dot green"></span>Active · ' + studentCount + ' student' + (studentCount !== 1 ? 's' : '') +
                    '</div>' +
                '</div>';
            grid.insertBefore(card, empty);
        });
    }

    /* ── Three-dot menu & actions ── */
    document.addEventListener('click', function(e) {
        var menuBtn = e.target.closest('.three-dot-btn');
        if (menuBtn) {
            e.stopPropagation();
            var id      = menuBtn.dataset.id;
            var menu    = document.getElementById('menu-' + id);
            var wasOpen = menu.classList.contains('open');
            document.querySelectorAll('.card-dropdown').forEach(function(d) { d.classList.remove('open'); });
            if (!wasOpen) menu.classList.add('open');
            return;
        }

        var actionBtn = e.target.closest('[data-action]');
        if (actionBtn) {
            document.querySelectorAll('.card-dropdown').forEach(function(d) { d.classList.remove('open'); });
            var action  = actionBtn.dataset.action;
            var classId = actionBtn.dataset.id;
            if (action === 'archive') {
                openConfirm(
                    'Archive this class?',
                    'The class will be moved to your archive. Students will no longer see it.',
                    function() {
                        fetch(API + '/' + classId + '/archive', {
                            method: 'PATCH',
                            headers: { Authorization: 'Bearer ' + token }
                        })
                        .then(function() { loadClasses(); })
                        .catch(function() { alert('Failed to archive.'); });
                    }
                );
            }
            return;
        }
        document.querySelectorAll('.card-dropdown').forEach(function(d) { d.classList.remove('open'); });
    });

    /* Confirm popup */
    var pendingFn = null;

    function openConfirm(title, msg, callback) {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-msg').textContent   = msg;
        pendingFn = callback;
        var el = document.getElementById('confirm-overlay');
        el.style.display = 'flex';
        setTimeout(function() { el.classList.add('visible'); }, 10);
    }

    function closeConfirm() {
        var el = document.getElementById('confirm-overlay');
        el.classList.remove('visible');
        setTimeout(function() { el.style.display = 'none'; }, 230);
        pendingFn = null;
    }

    function handleBackdropClick(e) {
        if (e.target === document.getElementById('confirm-overlay')) closeConfirm();
    }

    document.getElementById('confirm-ok-btn').onclick = function() {
        if (pendingFn) pendingFn();
        closeConfirm();
    };

    /* Sign-out popup */
    function openSignoutPopup() {
        var el = document.getElementById('signout-overlay');
        el.style.display = 'flex';
        setTimeout(function() { el.classList.add('visible'); }, 10);
    }

    function closeSignoutPopup() {
        var el = document.getElementById('signout-overlay');
        el.classList.remove('visible');
        setTimeout(function() { el.style.display = 'none'; }, 230);
    }

    function handleSignoutBackdrop(e) {
        if (e.target === document.getElementById('signout-overlay')) closeSignoutPopup();
    }

    function doSignout() {
        localStorage.removeItem('token');
        localStorage.removeItem('us_user');
        window.location.href = '../index.html';
    }

    loadClasses();

</script>

</body>
</html>
