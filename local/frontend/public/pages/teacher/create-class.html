<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Class — Unispace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/Teacher_base.css">
    <link rel="stylesheet" href="../../assets/css/Teacher_dashboard.css">
</head>

<body>

    <div class="page-wrapper">
        <div class="app-box">

            <aside class="sidebar">
                <div class="sidebar-brand">
                    <img src="../../assets/images/logo.png" alt="Unispace" class="sidebar-logo">

                </div>

                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="nav-link">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round">
                            <rect x="3" y="3" width="7" height="7" rx="1.5" />
                            <rect x="14" y="3" width="7" height="7" rx="1.5" />
                            <rect x="3" y="14" width="7" height="7" rx="1.5" />
                            <rect x="14" y="14" width="7" height="7" rx="1.5" />
                        </svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="classes.html" class="nav-link">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round">
                            <path d="M4 19.5A2.5 2.5 0 016.5 17H20" />
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" />
                        </svg>
                        <span>My Classes</span>
                    </a>
                    <a href="create-class.html" class="nav-link active">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 8v8M8 12h8" />
                        </svg>
                        <span>New Class</span>
                    </a>
                    <a href="schedule.html" class="nav-link">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" />
                            <path d="M16 2v4M8 2v4M3 10h18" />
                        </svg>
                        <span>Schedule</span>
                    </a>
                    <a href="class-info.html" class="nav-link">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 16v-4M12 8h.01" />
                        </svg>
                        <span>Class Info</span>
                    </a>
                    <a href="archive.html" class="nav-link">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round">
                            <polyline points="21 8 21 21 3 21 3 8" />
                            <rect x="1" y="3" width="22" height="5" rx="1" />
                            <path d="M10 12h4" />
                        </svg>
                        <span>Archive</span>
                    </a>
                </nav>

                <div class="sidebar-footer">
                    <div class="teacher-avatar" id="sidebar-avatar"></div>
                    <div class="teacher-info">
                        <span class="teacher-name" id="teacher-name"></span>
                        <span class="teacher-role">Teacher</span>
                    </div>
                    <button class="logout-link" title="Sign out" onclick="openSignoutPopup()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
                        </svg>
                    </button>
                </div>
            </aside>

            <main class="main-content">

                <header class="topbar">
                    <div class="topbar-left">
                        <p id="welcome-msg"></p>
                        <h1>New Class</h1>
                    </div>
                    <div class="topbar-right">
                        <span class="current-date" id="today-date"></span>
                        
                        <div class="topbar-avatar-wrap" id="avatar-wrap">
                            <div class="topbar-avatar" id="topbar-avatar" onclick="toggleDropdown(event)" title="Account"></div>

                            <div class="avatar-dropdown" id="avatar-dropdown">
                                <div class="dropdown-header">
                                    <div class="dropdown-header-avatar" id="dropdown-avatar"></div>
                                    <div class="dropdown-header-info">
                                        <span class="dropdown-header-name" id="dropdown-name"></span>
                                        <span class="dropdown-header-role">Teacher</span>
                                    </div>
                                </div>

                                <a href="profile.html" class="dropdown-item">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                        <circle cx="12" cy="8" r="4"/>
                                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                                    </svg>
                                    View Profile
                                </a>

                                <a href="settings.html" class="dropdown-item">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                        <circle cx="12" cy="12" r="3"/>
                                        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                                    </svg>
                                    Settings
                                </a>
                            </div>
                        </div>
                    </div>
                </header>

                <div class="page-body">
                    <div class="page-content">

                        <div class="form-card">
                            <h2>Create New Class</h2>
                            <p class="form-subtitle">Fill in the details below to set up your class</p>

                            <form id="class-form" onsubmit="submitForm(event)">

                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="course-name">Course Name</label>
                                        <div class="input-wrap">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                                stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                                <path d="M4 19.5A2.5 2.5 0 016.5 17H20" />
                                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" />
                                            </svg>
                                            <input type="text" id="course-name" placeholder="e.g. Data Structures"
                                                required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="dept">Department</label>
                                        <div class="input-wrap">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                                stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                                            </svg>
                                            <input type="text" id="dept" placeholder="e.g. CSE" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="batch">Batch</label>
                                        <div class="input-wrap">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                                stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                                                <circle cx="9" cy="7" r="4" />
                                            </svg>
                                            <input type="text" id="batch" placeholder="e.g. 2022" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="section">Section</label>
                                        <div class="input-wrap">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                                stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                                <path d="M9 11l3 3L22 4" />
                                            </svg>
                                            <input type="text" id="section" placeholder="e.g. A" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Student ID Range</label>
                                    <div class="form-row align-center">
                                        <div class="input-wrap" style="flex:1;">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                                stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                                <rect x="2" y="5" width="20" height="14" rx="2" />
                                                <path d="M2 10h20" />
                                            </svg>
                                            <input type="text" id="id-from" placeholder="From" required>
                                        </div>
                                        <span class="range-dash">—</span>
                                        <div class="input-wrap" style="flex:1;">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                                stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                                <rect x="2" y="5" width="20" height="14" rx="2" />
                                                <path d="M2 10h20" />
                                            </svg>
                                            <input type="text" id="id-to" placeholder="To" required>
                                        </div>
                                    </div>
                                </div>

                                <!-- CLASS CODE -->
                                <div class="form-group">
                                    <label for="class-code">Class Code</label>
                                    <div class="input-wrap has-actions">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                            <rect x="3" y="11" width="18" height="11" rx="2" />
                                            <path d="M7 11V7a5 5 0 0110 0v4" />
                                        </svg>
                                        <input type="text" id="class-code" placeholder="Type your class code"
                                            maxlength="12" required
                                            oninput="this.value = this.value.toUpperCase(); resetOk();">
                                        <div class="code-actions">
                                            <button type="button" class="code-copy-btn" onclick="copyCode()"
                                                title="Copy code">
                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                                                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                                                    <rect x="9" y="9" width="13" height="13" rx="2" />
                                                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
                                                </svg>
                                                Copy
                                            </button>
                                            <button type="button" class="code-ok-btn" id="ok-btn"
                                                onclick="confirmCode()">
                                                <svg class="ok-check" width="14" height="14" viewBox="0 0 24 24"
                                                    fill="none" stroke="currentColor" stroke-width="2.8"
                                                    stroke-linecap="round">
                                                    <path d="M20 6L9 17l-5-5" />
                                                </svg>
                                                <span class="ok-text">OK</span>
                                                <span class="ok-confirmed-text" style="display:none;">Saved</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <!-- END CLASS CODE -->

                                <div class="form-actions">
                                    <a href="classes.html" class="btn-secondary">Cancel</a>
                                    <button type="submit" class="btn-primary">
                                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="3" stroke-linecap="round">
                                            <path d="M12 5v14M5 12h14" />
                                        </svg>
                                        Create Class
                                    </button>
                                </div>

                            </form>
                        </div>

                    </div>
                </div>

            </main>

        </div>
    </div>

    <!-- signout popup -->
    <div class="modal-overlay" id="signout-overlay" style="display:none;" onclick="handleBackdropClick(event)">
        <div class="signout-box">
            <div class="signout-icon-wrap">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1e3a52" stroke-width="1.8"
                    stroke-linecap="round">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
                </svg>
            </div>
            <h3>Sign out?</h3>
            <p>Are you sure you want to sign out?</p>
            <div class="signout-actions">
                <button class="btn-secondary" onclick="closeSignoutPopup()">Cancel</button>
                <button class="btn-danger" onclick="doSignout()">Yes, sign out</button>
            </div>
        </div>
    </div>

    <div class="copy-toast" id="copy-toast">✓ Code copied to clipboard</div>

    <script>

        var fullName = localStorage.getItem('teacher_fullName') || 'Teacher';
        var initial  = fullName.charAt(0).toUpperCase();

        document.getElementById('teacher-name').textContent    = fullName;
        document.getElementById('welcome-msg').textContent     = 'Welcome back, ' + fullName;
        document.getElementById('sidebar-avatar').textContent  = initial;
        document.getElementById('topbar-avatar').textContent   = initial;
        document.getElementById('dropdown-avatar').textContent = initial;
        document.getElementById('dropdown-name').textContent   = fullName;

        // Reset form on page load to clear any previously filled fields
        document.getElementById('class-form').reset();

        var token = localStorage.getItem('token') || '';
        if (token) {
            fetch('http://localhost:3000/api/auth/me', {
                headers: { Authorization: 'Bearer ' + token }
            })
            .then(function(r){ return r.json(); })
            .then(function(data){
                if (data._id || data.id) {
                    localStorage.setItem('us_user', JSON.stringify(data));
                    var fn = data.fullName || fullName;
                    var si = fn.charAt(0).toUpperCase();
                    localStorage.setItem('fullName', fn);
                    document.getElementById('teacher-name').textContent    = fn;
                    document.getElementById('welcome-msg').textContent     = 'Welcome back, ' + fn;
                    document.getElementById('sidebar-avatar').textContent  = si;
                    document.getElementById('topbar-avatar').textContent   = si;
                    document.getElementById('dropdown-avatar').textContent = si;
                    document.getElementById('dropdown-name').textContent   = fn;
                }
            })
            .catch(function(){});
        }

        var dropdownEl = document.getElementById('avatar-dropdown');
        var avatarEl   = document.getElementById('topbar-avatar');
        var isOpen     = false;

        function toggleDropdown(e) {
            e.stopPropagation();
            isOpen ? closeDropdown() : openDropdown();
        }

        function openDropdown() {
            isOpen = true;
            dropdownEl.classList.add('visible');
            avatarEl.classList.add('open');
        }

        function closeDropdown() {
            isOpen = false;
            dropdownEl.classList.remove('visible');
            avatarEl.classList.remove('open');
        }

        document.addEventListener('click', function(e) {
            var wrap = document.getElementById('avatar-wrap');
            if (isOpen && wrap && !wrap.contains(e.target)) {
                closeDropdown();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && isOpen) closeDropdown();
        });

        document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        var codeConfirmed = false;

        function confirmCode() {
            var code = document.getElementById('class-code').value.trim();
            if (!code) return;
            codeConfirmed = true;

            var btn = document.getElementById('ok-btn');
            btn.classList.add('confirmed');
            btn.querySelector('.ok-text').style.display = 'none';
            btn.querySelector('.ok-confirmed-text').style.display = 'inline';
            btn.querySelector('.ok-check').style.display = 'inline';
            document.getElementById('class-code').readOnly = true;
        }

        function resetOk() {
            if (!codeConfirmed) return;
            codeConfirmed = false;
            var btn = document.getElementById('ok-btn');
            btn.classList.remove('confirmed');
            btn.querySelector('.ok-text').style.display = 'inline';
            btn.querySelector('.ok-confirmed-text').style.display = 'none';
            btn.querySelector('.ok-check').style.display = 'none';
            document.getElementById('class-code').readOnly = false;
        }

        function copyCode() {
            var code = document.getElementById('class-code').value.trim();
            if (!code) return;
            navigator.clipboard.writeText(code).then(function () {
                var toast = document.getElementById('copy-toast');
                toast.classList.add('show');
                setTimeout(function () { toast.classList.remove('show'); }, 2200);
            });
        }

        function submitForm(e) {
            e.preventDefault();

            var code = document.getElementById('class-code').value.trim().toUpperCase();
            if (!code) { showFormError('Please enter a class code.'); return; }

            var token = localStorage.getItem('token') || '';
            if (!token) {
                showFormError('You are not logged in. Please log in again.');
                return;
            }

            var submitBtn = document.querySelector('[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating…';

            var payload = {
                course:    document.getElementById('course-name').value.trim(),
                dept:      document.getElementById('dept').value.trim(),
                batch:     document.getElementById('batch').value.trim(),
                section:   document.getElementById('section').value.trim(),
                idFrom:    document.getElementById('id-from').value.trim(),
                idTo:      document.getElementById('id-to').value.trim(),
                classCode: code
            };

            fetch('http://localhost:3000/api/classrooms', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(payload)
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.classroom) {
                    window.location.href = 'classes.html';
                } else {
                    showFormError(data.message || 'Something went wrong. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Class';
                }
            })
            .catch(function() {
                showFormError('Network error — please check your connection.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Class';
            });
        }

        function showFormError(msg) {
            var existing = document.getElementById('form-error-msg');
            if (existing) existing.remove();
            var p = document.createElement('p');
            p.id = 'form-error-msg';
            p.style.cssText = 'color:#bc4f47;font-size:12.5px;margin-top:10px;font-weight:500;';
            p.textContent = msg;
            document.querySelector('.form-actions').insertAdjacentElement('afterend', p);
            setTimeout(function() { if (p.parentNode) p.remove(); }, 5000);
        }

        function openSignoutPopup() {
            var el = document.getElementById('signout-overlay');
            el.style.display = 'flex';
            setTimeout(function () { el.classList.add('visible'); }, 10);
        }

        function closeSignoutPopup() {
            var el = document.getElementById('signout-overlay');
            el.classList.remove('visible');
            setTimeout(function () { el.style.display = 'none'; }, 230);
        }

        function handleBackdropClick(e) {
            if (e.target === document.getElementById('signout-overlay')) closeSignoutPopup();
        }

        function doSignout() {
            localStorage.removeItem('token');
            localStorage.removeItem('us_user');
            window.location.href = '../index.html';
        }

    </script>

</body>

</html>
