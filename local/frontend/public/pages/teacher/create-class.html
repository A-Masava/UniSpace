<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Class — Unispace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/base.css">

    <style>
        /* ── Class Code field ── */
        .input-wrap.has-actions {
            padding-right: 0;
            overflow: hidden;
        }

        .input-wrap.has-actions input {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            flex: 1;
            min-width: 0;
        }

        .code-actions {
            display: flex;
            align-items: stretch;
            flex-shrink: 0;
            padding: 5px 6px;
            gap: 5px;
        }

        /* Copy button — subtle ghost style */
        .code-copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 0 12px;
            height: 100%;
            background: transparent;
            border: 1.5px solid #d8e2ea;
            border-radius: 7px;
            color: #6a7f8e;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .code-copy-btn:hover {
            border-color: #1e3a52;
            color: #1e3a52;
            background: #f4f8fb;
        }

        /* OK button — solid pill */
        .code-ok-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 20px;
            height: 100%;
            background: #1e3a52;
            border: none;
            border-radius: 7px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
            box-shadow: 0 2px 8px rgba(30,58,82,0.18);
            white-space: nowrap;
        }

        .code-ok-btn:hover {
            background: #16303f;
            box-shadow: 0 4px 14px rgba(30,58,82,0.28);
            transform: translateY(-1px);
        }

        .code-ok-btn:active {
            transform: translateY(0);
        }

        .code-ok-btn.confirmed {
            background: #1f7a4f;
            box-shadow: 0 2px 10px rgba(31,122,79,0.28);
            cursor: default;
        }

        .code-ok-btn.confirmed:hover {
            background: #1f7a4f;
            transform: none;
        }

        .ok-check {
            display: none;
        }

        .code-ok-btn.confirmed .ok-check {
            display: inline;
        }

        .code-ok-btn.confirmed .ok-text {
            display: none;
        }

        /* copy toast */
        .copy-toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: #1e3a52;
            color: #fff;
            padding: 9px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s, transform 0.22s;
            z-index: 9999;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="app-box">

        <aside class="sidebar">
            <div class="sidebar-brand">
                <img src="../../assets/images/logo.png" alt="Unispace" class="sidebar-logo">
                
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="classes.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                    </svg>
                    <span>My Classes</span>
                </a>
                <a href="create-class.html" class="nav-link active">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    <span>New Class</span>
                </a>
                <a href="schedule.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                    <span>Schedule</span>
                </a>
                <a href="class-info.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                    <span>Class Info</span>
                </a>
                <a href="archive.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <polyline points="21 8 21 21 3 21 3 8"/>
                        <rect x="1" y="3" width="22" height="5" rx="1"/>
                        <path d="M10 12h4"/>
                    </svg>
                    <span>Archive</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="teacher-avatar">T</div>
                <div class="teacher-info">
                    <span class="teacher-name">Dr. Rahman</span>
                    <span class="teacher-role">Teacher</span>
                </div>
                <button class="logout-link" title="Sign out" onclick="openSignoutPopup()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                </button>
            </div>
        </aside>

        <main class="main-content">

            <header class="topbar">
                <div class="topbar-left">
                    <p>Welcome back, Dr. Rahman 👋</p>
                    <h1>New Class</h1>
                </div>
                <div class="topbar-right">
                    <span class="current-date" id="today-date"></span>
                    <div class="topbar-avatar">T</div>
                </div>
            </header>

            <div class="page-body">
                <div class="page-content">

                    <div class="form-card">
                        <h2>Create New Class</h2>
                        <p class="form-subtitle">Fill in the details below to set up your class</p>

                        <form id="class-form" onsubmit="submitForm(event)">

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="course-name">Course Name</label>
                                    <div class="input-wrap">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                            <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                                        </svg>
                                        <input type="text" id="course-name" placeholder="e.g. Data Structures" required>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="dept">Department</label>
                                    <div class="input-wrap">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                                        </svg>
                                        <input type="text" id="dept" placeholder="e.g. CSE" required>
                                    </div>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="batch">Batch</label>
                                    <div class="input-wrap">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                                            <circle cx="9" cy="7" r="4"/>
                                        </svg>
                                        <input type="text" id="batch" placeholder="e.g. 2022" required>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="section">Section</label>
                                    <div class="input-wrap">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                            <path d="M9 11l3 3L22 4"/>
                                        </svg>
                                        <input type="text" id="section" placeholder="e.g. A" required>
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Student ID Range</label>
                                <div class="form-row align-center">
                                    <div class="input-wrap" style="flex:1;">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                            <rect x="2" y="5" width="20" height="14" rx="2"/>
                                            <path d="M2 10h20"/>
                                        </svg>
                                        <input type="text" id="id-from" placeholder="From" required>
                                    </div>
                                    <span class="range-dash">—</span>
                                    <div class="input-wrap" style="flex:1;">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                            <rect x="2" y="5" width="20" height="14" rx="2"/>
                                            <path d="M2 10h20"/>
                                        </svg>
                                        <input type="text" id="id-to" placeholder="To" required>
                                    </div>
                                </div>
                            </div>

                            <!-- CLASS CODE -->
                            <div class="form-group">
                                <label for="class-code">Class Code</label>
                                <div class="input-wrap has-actions">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                                    </svg>
                                    <input type="text"
                                           id="class-code"
                                           placeholder="Type your class code"
                                           maxlength="12"
                                           required
                                           oninput="this.value = this.value.toUpperCase(); resetOk();">
                                    <div class="code-actions">
                                        <button type="button" class="code-copy-btn" onclick="copyCode()" title="Copy code">
                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                                                <rect x="9" y="9" width="13" height="13" rx="2"/>
                                                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                            </svg>
                                            Copy
                                        </button>
                                        <button type="button" class="code-ok-btn" id="ok-btn" onclick="confirmCode()">
                                            <svg class="ok-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
                                                <path d="M20 6L9 17l-5-5"/>
                                            </svg>
                                            <span class="ok-text">OK</span>
                                            <span class="ok-confirmed-text" style="display:none;">Saved</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <!-- END CLASS CODE -->

                            <div class="form-actions">
                                <a href="classes.html" class="btn-secondary">Cancel</a>
                                <button type="submit" class="btn-primary">
                                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                                        <path d="M12 5v14M5 12h14"/>
                                    </svg>
                                    Create Class
                                </button>
                            </div>

                        </form>
                    </div>

                </div>
            </div>

        </main>

    </div>
</div>

<!-- signout popup -->
<div class="modal-overlay" id="signout-overlay" style="display:none;" onclick="handleBackdropClick(event)">
    <div class="signout-box">
        <div class="signout-icon-wrap">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1e3a52" stroke-width="1.8" stroke-linecap="round">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
        </div>
        <h3>Sign out?</h3>
        <p>You'll be taken back to the login screen.</p>
        <div class="signout-actions">
            <button class="btn-secondary" onclick="closeSignoutPopup()">Cancel</button>
            <button class="btn-danger" onclick="doSignout()">Yes, sign out</button>
        </div>
    </div>
</div>

<div class="copy-toast" id="copy-toast">✓ Code copied to clipboard</div>

<script>

    document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    var codeConfirmed = false;

    function confirmCode() {
        var code = document.getElementById('class-code').value.trim();
        if (!code) return;
        codeConfirmed = true;

        var btn = document.getElementById('ok-btn');
        btn.classList.add('confirmed');
        btn.querySelector('.ok-text').style.display = 'none';
        btn.querySelector('.ok-confirmed-text').style.display = 'inline';
        btn.querySelector('.ok-check').style.display = 'inline';
        document.getElementById('class-code').readOnly = true;
    }

    function resetOk() {
        if (!codeConfirmed) return;
        codeConfirmed = false;
        var btn = document.getElementById('ok-btn');
        btn.classList.remove('confirmed');
        btn.querySelector('.ok-text').style.display = 'inline';
        btn.querySelector('.ok-confirmed-text').style.display = 'none';
        btn.querySelector('.ok-check').style.display = 'none';
        document.getElementById('class-code').readOnly = false;
    }

    function copyCode() {
        var code = document.getElementById('class-code').value.trim();
        if (!code) return;
        navigator.clipboard.writeText(code).then(function() {
            var toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2200);
        });
    }

    function submitForm(e) {
        e.preventDefault();

        var code = document.getElementById('class-code').value.trim().toUpperCase();
        if (!code) { alert('Please enter a class code.'); return; }

        var allClasses = JSON.parse(localStorage.getItem('us_cls') || '[]');
        var duplicate = allClasses.find(function(c) { return c.code === code; });
        if (duplicate) {
            alert('Class code "' + code + '" is already in use. Please choose a different code.');
            return;
        }

        var newClass = {
            id:       'cls_' + Date.now(),
            course:   document.getElementById('course-name').value.trim(),
            dept:     document.getElementById('dept').value.trim(),
            batch:    document.getElementById('batch').value.trim(),
            section:  document.getElementById('section').value.trim(),
            idFrom:   document.getElementById('id-from').value.trim(),
            idTo:     document.getElementById('id-to').value.trim(),
            code:     code,
            students: [],
            created:  new Date().toLocaleDateString(),
            archived: false
        };

        allClasses.push(newClass);
        localStorage.setItem('us_cls', JSON.stringify(allClasses));
        window.location.href = 'classes.html';
    }

    function openSignoutPopup() {
        var el = document.getElementById('signout-overlay');
        el.style.display = 'flex';
        setTimeout(function() { el.classList.add('visible'); }, 10);
    }

    function closeSignoutPopup() {
        var el = document.getElementById('signout-overlay');
        el.classList.remove('visible');
        setTimeout(function() { el.style.display = 'none'; }, 230);
    }

    function handleBackdropClick(e) {
        if (e.target === document.getElementById('signout-overlay')) closeSignoutPopup();
    }

    function doSignout() {
        window.location.href = '../login.html';
    }

</script>

</body>
</html>
