<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive — Unispace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/base.css">
</head>
<body>

<div class="page-wrapper">
    <div class="app-box">

        <!-- sidebar -->
        <aside class="sidebar">

            <div class="sidebar-brand">
                <img src="../../assets/images/logo.png" alt="Unispace" class="sidebar-logo">
                
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="classes.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                    </svg>
                    <span>My Classes</span>
                </a>
                <a href="create-class.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    <span>New Class</span>
                </a>
                <a href="schedule.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                    <span>Schedule</span>
                </a>
                <a href="class-info.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                    <span>Class Info</span>
                </a>
                <a href="archive.html" class="nav-link active">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <polyline points="21 8 21 21 3 21 3 8"/>
                        <rect x="1" y="3" width="22" height="5" rx="1"/>
                        <path d="M10 12h4"/>
                    </svg>
                    <span>Archive</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="teacher-avatar">T</div>
                <div class="teacher-info">
                    <span class="teacher-name">Dr. Rahman</span>
                    <span class="teacher-role">Teacher</span>
                </div>
                <button class="logout-link" title="Sign out" onclick="openSignoutPopup()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                </button>
            </div>

        </aside>

        <!-- main content -->
        <main class="main-content">

            <header class="topbar">
                <div class="topbar-left">
                    <p>Welcome back, Dr. Rahman 👋</p>
                    <h1>Archive</h1>
                </div>
                <div class="topbar-right">
                    <span class="current-date" id="today-date"></span>
                    <div class="topbar-avatar">T</div>
                </div>
            </header>

            <div class="page-body">
                <div class="page-content">

                    <div class="toolbar-row">
                        <p class="count-label">Archived classes: <strong id="archived-count">0</strong></p>
                    </div>

                    <div class="class-grid" id="archive-grid">
                        <div class="empty-state" id="empty-state">
                            <div class="empty-icon">🗂️</div>
                            <p>Nothing archived yet.</p>
                            <p style="font-size:12px; color:#aaa; margin-top:-4px;">Archive a class from My Classes.</p>
                        </div>
                    </div>

                </div>
            </div>

        </main>

    </div>
</div>


<!-- signout popup -->
<div class="modal-overlay" id="signout-overlay" style="display:none;" onclick="handleBackdropClick(event)">
    <div class="signout-box">
        <div class="signout-icon-wrap">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1e3a52" stroke-width="1.8" stroke-linecap="round">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
        </div>
        <h3>Sign out?</h3>
        <p>You'll be taken back to the login screen.</p>
        <div class="signout-actions">
            <button class="btn-secondary" onclick="closeSignoutPopup()">Cancel</button>
            <button class="btn-danger" onclick="doSignout()">Yes, sign out</button>
        </div>
    </div>
</div>


<script>

    var classes = JSON.parse(localStorage.getItem('us_cls') || '[]');

    function initials(name) {
        return name.split(' ').map(function(w) { return w[0] || ''; }).join('').toUpperCase().slice(0, 2);
    }

    function save() {
        localStorage.setItem('us_cls', JSON.stringify(classes));
    }

    function archivedList() {
        return classes.filter(function(c) { return c.archived; });
    }

    document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    function renderArchive() {
        var grid     = document.getElementById('archive-grid');
        var empty    = document.getElementById('empty-state');
        var archived = archivedList();

        document.getElementById('archived-count').textContent = archived.length;

        // clear old cards and redraw
        grid.querySelectorAll('.class-card').forEach(function(el) { el.remove(); });

        if (archived.length === 0) {
            empty.style.display = 'flex';
            return;
        }

        empty.style.display = 'none';

        archived.forEach(function(cls) {
            var card = document.createElement('div');
            card.className = 'class-card is-archived';
            card.innerHTML =
                '<div class="class-card-top" style="background:#a8b8c0;">' +
                    '<div class="class-initials">' + initials(cls.course) + '</div>' +
                '</div>' +
                '<div class="class-card-body">' +
                    '<h3>' + cls.course + '</h3>' +
                    '<p class="class-meta">' + cls.dept + ' · Batch ' + cls.batch + '</p>' +
                    '<div class="class-status-row"><span class="status-dot grey"></span>Archived</div>' +
                    '<button class="restore-btn" data-id="' + cls.id + '">Restore Class</button>' +
                '</div>';
            grid.insertBefore(card, empty);
        });
    }

    // restore button click handler
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('.restore-btn');
        if (btn) {
            var id  = btn.dataset.id;
            var cls = classes.find(function(c) { return c.id === id; });
            if (cls) {
                cls.archived = false;
                save();
                renderArchive();
            }
        }
    });

    // signout popup
    function openSignoutPopup() {
        var el = document.getElementById('signout-overlay');
        el.style.display = 'flex';
        setTimeout(function() { el.classList.add('visible'); }, 10);
    }

    function closeSignoutPopup() {
        var el = document.getElementById('signout-overlay');
        el.classList.remove('visible');
        setTimeout(function() { el.style.display = 'none'; }, 230);
    }

    function handleBackdropClick(e) {
        if (e.target === document.getElementById('signout-overlay')) closeSignoutPopup();
    }

    function doSignout() {
        window.location.href = '../login.html';
    }

    renderArchive();

</script>

</body>
</html>
