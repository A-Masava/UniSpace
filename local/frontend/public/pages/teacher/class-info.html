<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/Teacher_base.css">
    <link rel="stylesheet" href="../../assets/css/class-info.css">
</head>
<body>

<div class="page-wrapper">
    <div class="app-box">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-brand">
    <img src="../../assets/images/logo.png" alt="Unispace" class="sidebar-logo">
</div>

            

            <nav class="sidebar-nav">

                <a href="dashboard.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                    <span>Dashboard</span>
                </a>

                <a href="classes.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                    </svg>
                    <span>My Classes</span>
                </a>

                <a href="create-class.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    <span>Create Class</span>
                </a>

                <a href="schedule.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                    <span>Schedule</span>
                </a>

                <a href="class-info.html" class="nav-link active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                    <span>Class Info</span>
                </a>

                <a href="archive.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <polyline points="21 8 21 21 3 21 3 8"/>
                        <rect x="1" y="3" width="22" height="5" rx="1"/>
                        <path d="M10 12h4"/>
                    </svg>
                    <span>Archive</span>
                </a>

            </nav>

            <div class="sidebar-footer">
                <div class="teacher-avatar" id="sidebar-avatar"></div>
                <div class="teacher-info">
                    <span class="teacher-name" id="teacher-name"></span>
                    <span class="teacher-role">Teacher</span>
                </div>
                <a href="../login.html" class="logout-link" title="Logout">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                </a>
            </div>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <header class="topbar">
                <div class="topbar-left">
                    <p id="welcome-msg"></p>
                    <h1>Class Info</h1>
                </div>
                <div class="topbar-right">
                    <span class="current-date" id="today-date"></span>
                    <div class="topbar-avatar" id="topbar-avatar"></div>
                </div>
            </header>

            <div class="page-body">
                <div class="page-content">

                    <p class="hint-text">Select a class to view its details</p>

                    <div class="pill-row" id="class-pills"></div>

                    <div class="info-detail-card" id="info-card" style="display: none;">
                        <div class="info-detail-top">
                            <div class="info-detail-badge" id="info-badge"></div>
                            <div>
                                <h2 id="info-course-name"></h2>
                                <p  id="info-subtitle"></p>
                            </div>
                        </div>
                        <div class="info-grid">
                            <div class="info-grid-item">
                                <span class="info-label">Department</span>
                                <span class="info-value" id="info-dept"></span>
                            </div>
                            <div class="info-grid-item">
                                <span class="info-label">Batch</span>
                                <span class="info-value" id="info-batch"></span>
                            </div>
                            <div class="info-grid-item">
                                <span class="info-label">Section</span>
                                <span class="info-value" id="info-section"></span>
                            </div>
                            <div class="info-grid-item">
                                <span class="info-label">Student ID Range</span>
                                <span class="info-value" id="info-id-range"></span>
                            </div>
                            <div class="info-grid-item">
                                <span class="info-label">Created</span>
                                <span class="info-value" id="info-created"></span>
                            </div>
                            <div class="info-grid-item">
                                <span class="info-label">Status</span>
                                <span class="info-value" id="info-status"></span>
                            </div>
                        </div>
                    </div>

                    <div class="empty-state" id="empty-state">
                        <div class="empty-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="16" x2="12" y2="12"></line>
                                <line x1="12" y1="8" x2="12.01" y2="8"></line>
                            </svg>
                        </div>
                        <p>No active classes found. <a href="create-class.html" style="color: #1565C0;">Create one first.</a></p>
                    </div>

                </div>
            </div>

        </main>

    </div>
</div>

<script>

    var fullName = localStorage.getItem('fullName') || 'Teacher';
    var initial  = fullName.charAt(0).toUpperCase();
    document.getElementById('teacher-name').textContent   = fullName;
    document.getElementById('sidebar-avatar').textContent = initial;
    document.getElementById('topbar-avatar').textContent  = initial;
    document.getElementById('welcome-msg').textContent    = 'Welcome back, ' + fullName;

    var savedClasses = JSON.parse(localStorage.getItem('us_cls') || '[]');
    var currentUserId = localStorage.getItem('userId');
    
    
    savedClasses = savedClasses.filter(function(c) { 
        return c.teacherId === currentUserId || !c.teacherId; 
    });

    
    var palette = [
        '#a9c1cc', '#93b1be', '#7da0af', '#678fa1',
        '#587c8d', '#4b6a78', '#3d5863', '#2f454e'
    ];

    function color(i) { return palette[i % palette.length]; }

    function getInitials(name) {
        return name
            .split(' ')
            .map(function(word) { return word[0] || ''; })
            .join('')
            .toUpperCase()
            .slice(0, 2);
    }

    function getActiveClasses() {
        return savedClasses.filter(function(c) { return !c.archived; });
    }

    document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });

    var activeClasses = getActiveClasses();
    var pillRow       = document.getElementById('class-pills');
    var emptyState    = document.getElementById('empty-state');

    if (activeClasses.length === 0) {
        emptyState.style.display = 'flex';
    } else {
        emptyState.style.display = 'none';

        activeClasses.forEach(function(cls) {
            var pill = document.createElement('button');
            pill.className   = 'class-pill';
            pill.textContent = cls.course;

            pill.onclick = function() {
                // remove selected from all pills first
                document.querySelectorAll('.class-pill').forEach(function(p) {
                    p.classList.remove('selected');
                });
                pill.classList.add('selected');
                showClassInfo(cls.id);
            };

            pillRow.appendChild(pill);
        });

      
        var urlParams  = new URLSearchParams(window.location.search);
        var passedId   = urlParams.get('id');

        if (passedId) {
            var firstPill = pillRow.querySelector('.class-pill');
            if (firstPill) {
                firstPill.classList.add('selected');
                showClassInfo(passedId);
            }
        }
    }

    function showClassInfo(classId) {
        var cls = savedClasses.find(function(c) { return c.id === classId; });
        if (!cls) return;

       
        var activeClasses = getActiveClasses();
        var classIndex = activeClasses.findIndex(function(c) { return c.id === classId; });
        var classColor = color(classIndex);

        document.getElementById('info-card').style.display = 'block';
        document.getElementById('info-badge').textContent       = getInitials(cls.course);
        document.getElementById('info-badge').style.background  = classColor;
        document.getElementById('info-course-name').textContent = cls.course;
        document.getElementById('info-subtitle').textContent    = cls.dept + ' · Batch ' + cls.batch;
        document.getElementById('info-dept').textContent        = cls.dept;
        document.getElementById('info-batch').textContent       = cls.batch;
        document.getElementById('info-section').textContent     = cls.section;
        document.getElementById('info-id-range').textContent    = cls.idFrom + ' – ' + cls.idTo;
        document.getElementById('info-created').textContent     = cls.created;
        document.getElementById('info-status').textContent      = cls.archived ? 'Archived' : 'Active';
    }

</script>

</body>
</html>
