<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unispace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/index.css"/>
</head>
<body>

  <div class="main-page">
    <div class="big-card">

      <!-- left panel -->
      <div class="left-panel">
        <div class="shape1"></div>
        <div class="shape2"></div>
        <div class="shape3"></div>
        <div class="shape4"></div>

        <div class="left-text-area">
          <div class="welcome-text">
            <h1>Welcome to<br/><em>Unispace-Smart Classroom System</em></h1>
            <p>Your all-in-one academic workspace — manage classes, resources, schedules and chat with your university community.</p>
            <p class="small-text">Join thousands of students and teachers already learning together.</p>
          </div>
        </div>
      </div>

      <!-- right panel -->
      <div class="right-panel">

        <!-- logo top right -->
        <div class="top-brand">
          <img src="../assets/images/logo.png" class="logo-img" alt="Unispace Logo"/>
        </div>

        <!-- login and signup buttons -->
        <div class="btn-section">
          <h2 class="main-heading">Get Started</h2>
          <p class="sub-text">New here or returning? Choose below.</p>

          <button class="big-btn" onclick="showPopup('login')">Login</button>

          <div class="or-divider"><span>or</span></div>

          <button class="big-btn outline-btn" onclick="showPopup('signup')">Sign Up</button>

        </div>

      </div>
    </div>
  </div>


  <!-- dark overlay when popup opens -->
  <div class="dark-overlay" id="dark-overlay" onclick="hidePopup()"></div>

  <!-- popup to choose teacher or student -->
  <div class="role-popup" id="role-popup">
    <button class="close-btn" onclick="hidePopup()">&#x2715;</button>
    <p class="popup-title" id="popup-title">Who are you?</p>

    <button class="role-btn" onclick="goToPage('teacher')">Are you a Teacher?</button>

    <div class="popup-or">OR</div>

    <button class="role-btn" onclick="goToPage('student')">Are you a Student?</button>
  </div>


  <script>

    // login or signup, save which one the user clicked
    var currentMode = 'login';

    function showPopup(mode) {
      currentMode = mode;

      // change the heading based on what they clicked
      if (mode === 'login') {
        document.getElementById('popup-title').textContent = 'Sign in as...';
      } else {
        document.getElementById('popup-title').textContent = 'Sign up as...';
      }

      document.getElementById('dark-overlay').classList.add('visible');
      document.getElementById('role-popup').classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    function hidePopup() {
      document.getElementById('dark-overlay').classList.remove('visible');
      document.getElementById('role-popup').classList.remove('visible');
      document.body.style.overflow = '';
    }

    // redirect to the right page based on role
    function goToPage(role) {
      hidePopup();
      if (currentMode === 'login') {
        window.location.href = 'login.html?role=' + role;
      } else {
        window.location.href = 'signup.html?role=' + role;
      }
    }

    // close popup on escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        hidePopup();
      }
    });

  </script>

</body>
</html>
