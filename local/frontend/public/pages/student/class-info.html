<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Info — Unispace Student</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/Student_base.css">

    <style>
        .tabs {
            border-bottom: 2px solid #e1e8f0;
            display: flex;
            gap: 30px;
            margin-bottom: 24px;
            margin-top: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: #64748b;
            padding-bottom: 12px;
            cursor: pointer;
            position: relative;
        }

        .tab-btn.active {
            color: #0e2b4e;
        }



        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #1565C0;
            border-radius: 3px 3px 0 0;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .info-item label {
            display: block;
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .info-item span {
            font-size: 15px;
            color: #0f172a;
            font-weight: 500;
        }

        .announcement-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .announcement-date {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .announcement-text {
            font-size: 15px;
            color: #334155;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .empty-announcements {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 0;
        }
        .empty-announcements img {
            width: 240px;
            margin-bottom: 16px;
            opacity: 0.9;
        }
        .empty-announcements h4 {
            margin: 0 0 8px 0;
            color: #1e293b;
            font-size: 16px;
            font-weight: 700;
        }
        .empty-announcements p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
        }

        .chat-container { 
            border: 1px solid #e2e8f0; border-radius: 12px; display: flex; flex-direction: column; height: 500px; overflow: hidden; position: relative; 
            background-color: #eef3f8;
        }
        .chat-container::before {
            content: ''; position: absolute; inset: 0;
            background-image: url('../../assets/images/chat_pattern.png');
            background-size: 300px;
            background-position: top left;
            background-repeat: repeat;
            opacity: 0.6;
            pointer-events: none; z-index: 0;
        }
        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
            position: relative; z-index: 1; background: transparent;
        }

        .chat-message {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .chat-message.self {
            align-self: flex-end;
        }

        .chat-message.other {
            align-self: flex-start;
        }

        .chat-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14.5px;
            line-height: 1.4;
        }

        .chat-message.self .chat-bubble {
            background: #1565C0;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .chat-message.other .chat-bubble {
            background: #e2e8f0;
            color: #0f172a;
            border-bottom-left-radius: 4px;
        }

        .chat-sender {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .chat-input-area {
            position: relative;
            z-index: 1;
            padding: 16px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            background: #fff;
            border-radius: 0 0 12px 12px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #1565C0;
        }

        .chat-input-area button {
            background: #1565C0;
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-input-area button:hover {
            background: #0e488d;
        }
    </style>
</head>

<body>

        <div class="app-box">

            <!-- sidebar -->
            <aside class="sidebar">
                <div class="sidebar-brand">
                    <img src="../../assets/images/logo.png" alt="Unispace" class="sidebar-logo">
                </div>

                <nav class="sidebar-nav">

                            <rect x="14" y="3" width="7" height="7" rx="1.5" />
                            <rect x="3" y="14" width="7" height="7" rx="1.5" />
                            <rect x="14" y="14" width="7" height="7" rx="1.5" />
                        </svg>
                        <span>Dashboard</span>

                    <a href="join-class.html" class="nav-link">

                <div class="sidebar-footer">
                    <div class="student-avatar" id="sidebar-avatar"></div>
                    <div class="student-info">
                        <span class="student-name" id="student-name"></span>
                        <span class="student-role">Student</span>
                    </div>
                    <button class="logout-link" title="Sign out" onclick="doSignout()">

                    </button>

            <!-- main content -->
            <main class="main-content">
                <header class="topbar">
                    <div class="topbar-left">
                        <p id="welcome-msg">Class Details</p>
                        <h1 id="header-course-name">Loading...</h1>
                    </div>
                    <div class="topbar-right">
                        <span class="current-date" id="today-date"></span>
                        <div class="topbar-avatar" id="topbar-avatar"></div>
                    </div>
                </header>

                <div class="page-body">
                    <div class="page-content">
                        <a href="classes.html"
                            style="color: #64748b; text-decoration: none; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 16px;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round">
                                <path d="M19 12H5M12 19l-7-7 7-7" />
                            </svg>
                            Back to Classes
                        </a>

                        <div class="tabs">
                            <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
                            <button class="tab-btn" onclick="switchTab('announcements')">Announcements</button>
                            <button class="tab-btn" onclick="switchTab('chat')">Chat</button>
                        </div>

                        <!-- OVERVIEW -->
                        <div id="tab-overview" class="tab-pane active">
                            <div class="info-grid">
                                <div class="info-item"><label>Teacher</label><span id="overview-teacher">-</span></div>
                                <div class="info-item"><label>Department</label><span id="overview-dept">-</span></div>
                                <div class="info-item"><label>Batch</label><span id="overview-batch">-</span></div>
                                <div class="info-item"><label>Section</label><span id="overview-section">-</span></div>
                                <div class="info-item"><label>Class Code</label><span id="overview-code">-</span></div>
                            </div>
                        </div>

                        <!-- ANNOUNCEMENTS -->
                        <div id="tab-announcements" class="tab-pane">
                            <div id="announcement-list"></div>
                        </div>

                        <!-- CHAT -->
                        <div id="tab-chat" class="tab-pane">
                            <div class="chat-container">
                                <div class="chat-messages" id="chat-messages">
                                    <!-- messages load here -->
                                </div>
                                <div class="chat-input-area">
                                    <input type="text" id="chat-input" placeholder="Type a message..."
                                        onkeydown="if(event.key === 'Enter') sendChatMessage()">

<!-- decorative illustration -->
<div class="deco-illustration">
    <img src="../../assets/images/book.png" alt="">
</div>


    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        var API = 'http://localhost:3000/api';
        var token = localStorage.getItem('token') || '';
        var studentId = localStorage.getItem('userId'); // assuming we have this, or extract from token

        var urlParams = new URLSearchParams(window.location.search);
        var classId = urlParams.get('id');

        var fullName = localStorage.getItem('student_fullName') || 'Student';
        var initial = fullName.charAt(0).toUpperCase();

        document.getElementById('student-name').textContent = fullName;
        document.getElementById('sidebar-avatar').textContent = initial;
        document.getElementById('topbar-avatar').textContent = initial;
        document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        var socket = io('http://localhost:3000');

        if (classId) {
            socket.emit('join_room', { room: classId });
            socket.on('receive_message', function (data) {
                appendChatMessage(data);
                scrollToBottom();
            });

            fetchClassData();
            fetchAnnouncements();
            fetchChatHistory();
        } else {
            document.getElementById('header-course-name').textContent = 'Class not found';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');

            if (tabId === 'chat') {
                scrollToBottom();
            }
        }

        function fetchClassData() {
            fetch(API + '/classrooms/' + classId, { headers: { Authorization: 'Bearer ' + token } })
                .then(r => r.json())
                .then(cls => {
                    document.getElementById('header-course-name').textContent = cls.course;
                    document.getElementById('overview-teacher').textContent = cls.teacher ? cls.teacher.fullName : 'Unknown';
                    document.getElementById('overview-dept').textContent = cls.dept;
                    document.getElementById('overview-batch').textContent = cls.batch;
                    document.getElementById('overview-section').textContent = cls.section;
                    document.getElementById('overview-code').textContent = cls.classCode;
                }).catch(e => console.error(e));
        }

        function fetchAnnouncements() {
            fetch(API + '/classrooms/' + classId + '/announcements', { headers: { Authorization: 'Bearer ' + token } })
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('announcement-list');
                    list.innerHTML = '';
                    if (data.length === 0) {
                        list.innerHTML = `
                            <div class="empty-announcements">
                                <img src="../../assets/images/empty_announcements.png" alt="No announcements">
                                <h4>No announcements yet</h4>
                                <p>When your teacher posts announcements, they will appear here.</p>
                            </div>
                        `;
                        return;
                    }
                    data.forEach(ann => {
                        const d = new Date(ann.createdAt).toLocaleString();
                        const el = document.createElement('div');
                        el.className = 'announcement-card';
                        el.innerHTML = `<div class="announcement-date">${d}</div><div class="announcement-text">${ann.text}</div>`;
                        list.appendChild(el);
                    });
                });
        }

        function fetchChatHistory() {
            fetch(API + '/chat/messages/' + classId, { headers: { Authorization: 'Bearer ' + token } })
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('chat-messages');
                    container.innerHTML = '';
                    data.forEach(msg => appendChatMessage(msg));
                    scrollToBottom();
                });
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            fetch(API + '/chat/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
                body: JSON.stringify({ classroomId: classId, message: text })
            }).then(r => r.json()).then(msg => {
                // we broadcast the message via socket. Wait! we don't need to manually socket.emit message from client if backend sends it. Or backend doesn't emit it?
                // Usually backend socket handles it, but since we use REST POST to save, we should emit so others see.
                socket.emit('send_message', { ...msg, room: classId });
            });
        }

        // data format: { _id, sender: { _id, fullName, avatar }, message, senderModel }
        function appendChatMessage(data) {
            if (!document.getElementById('chat-msg-' + data._id) && data.sender) {
                const isSelf = data.sender._id === studentId || data.sender.fullName === fullName;
                const container = document.getElementById('chat-messages');
                const el = document.createElement('div');
                el.id = 'chat-msg-' + data._id;
                el.className = 'chat-message ' + (isSelf ? 'self' : 'other');

                const senderName = isSelf ? 'You' : data.sender.fullName;
                el.innerHTML = `
                <div class="chat-sender">${senderName}</div>
                <div class="chat-bubble">${data.message}</div>
            `;
                container.appendChild(el);
            }
        }

        function scrollToBottom() {
            const c = document.getElementById('chat-messages');
            c.scrollTop = c.scrollHeight;
        }

        function doSignout() {
            localStorage.removeItem('token');
            localStorage.removeItem('us_user');
            window.location.href = '../index.html';
        }
    </script>
</body>

</html>
