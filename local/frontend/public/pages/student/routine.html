<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine — Unispace Student</title>
    <meta name="description" content="Manage your personal class routine on Unispace.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/Student_base.css">
</head>
<body>

<div class="page-wrapper">
    <div class="app-box">

        <!-- sidebar -->
        <aside class="sidebar">

            <div class="sidebar-brand">
                <img src="../../assets/images/logo.png" alt="Unispace" class="sidebar-logo">
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="join-class.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    <span>Join Class</span>
                </a>
                <a href="classes.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                    </svg>
                    <span>My Classes</span>
                </a>
                <a href="routine.html" class="nav-link active">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                    <span>Routine</span>
                </a>
                <a href="archive.html" class="nav-link">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                        <polyline points="21 8 21 21 3 21 3 8"/>
                        <rect x="1" y="3" width="22" height="5" rx="1"/>
                        <path d="M10 12h4"/>
                    </svg>
                    <span>Archive</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="student-avatar" id="sidebar-avatar"></div>
                <div class="student-info">
                    <span class="student-name" id="student-name"></span>
                    <span class="student-role">Student</span>
                </div>
                <button class="logout-link" title="Sign out" onclick="openSignoutPopup()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                </button>
            </div>

        </aside>

        <!-- main content -->
        <main class="main-content">

            <header class="topbar">
                <div class="topbar-left">
                    <p id="welcome-msg"></p>
                    <h1>Routine</h1>
                </div>
                <div class="topbar-right">
                    <span class="current-date" id="today-date"></span>
                    <div class="topbar-avatar" id="topbar-avatar"></div>
                </div>
            </header>

            <div class="page-body">
                <div class="page-content">

                    <div class="toolbar-row">
                        <p class="count-label">Total slots: <strong id="slot-count">0</strong></p>
                        <button class="btn-primary" id="open-modal-btn">+ Add Slot</button>
                    </div>

                    <div class="slot-list" id="slot-list">
                        <div class="empty-state" id="empty-state" style="display:none;">
                            <div class="empty-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                            </div>
                            <p>No routine slots yet.</p>
                            <button class="btn-outline" id="add-first-btn" style="margin-top:4px;">Add your first slot</button>
                        </div>
                    </div>

                </div>
            </div>

        </main>

    </div>
</div>


<!-- add slot modal -->
<div class="modal-overlay" id="slot-modal" style="display:none;" onclick="handleModalBackdrop(event)">
    <div class="modal-box">

        <div class="modal-header">
            <h3 id="modal-title">Add Routine Slot</h3>
            <button class="modal-close-btn" onclick="closeModal()">✕</button>
        </div>

        <div class="form-group">
            <label for="pick-subject">Subject</label>
            <div class="input-wrap">
                <input type="text" id="pick-subject" placeholder="e.g. Physics 101">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="pick-day">Day</label>
                <select id="pick-day">
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                    <option>Sunday</option>
                </select>
            </div>
            <div class="form-group">
                <label for="pick-time">Time</label>
                <input type="time" id="pick-time">
            </div>
        </div>

        <div class="form-group">
            <label for="room-no">Room</label>
            <div class="input-wrap">
                <input type="text" id="room-no" placeholder="e.g. Room 301">
            </div>
        </div>

        <div class="form-actions">
            <button class="btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn-primary" id="save-slot-btn">Save Slot</button>
        </div>

    </div>
</div>


<!-- sign-out popup -->
<div class="modal-overlay" id="signout-overlay" style="display:none;" onclick="handleSignoutBackdrop(event)">
    <div class="signout-box">
        <div class="signout-icon-wrap">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0e2b4e" stroke-width="1.8" stroke-linecap="round">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
        </div>
        <h3>Sign out?</h3>
        <p>Are you sure you want to sign out?</p>
        <div class="signout-actions">
            <button class="btn-secondary" onclick="closeSignoutPopup()">Cancel</button>
            <button class="btn-danger" onclick="doSignout()">Yes, sign out</button>
        </div>
    </div>
</div>


<script>

    var fullName = localStorage.getItem('student_fullName') || 'Student';
    var initial  = fullName.charAt(0).toUpperCase();
    document.getElementById('student-name').textContent   = fullName;
    document.getElementById('sidebar-avatar').textContent = initial;
    document.getElementById('topbar-avatar').textContent  = initial;
    document.getElementById('welcome-msg').textContent    = 'Welcome back, ' + fullName;

    document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    var userId = localStorage.getItem('userId') || '';
    var routine = JSON.parse(localStorage.getItem('st_rtn_' + userId) || '[]');

    function save() {
        localStorage.setItem('st_rtn_' + userId, JSON.stringify(routine));
    }

    var palette = ['#1565C0','#0e2b4e','#1976D2','#1a4a7a','#163d6a','#2a5f94','#1E88E5','#0d3568'];
    function color(i) { return palette[i % palette.length]; }

    function renderSlots() {
        var list  = document.getElementById('slot-list');
        var empty = document.getElementById('empty-state');

        document.getElementById('slot-count').textContent = routine.length;

        // clear and redraw
        list.querySelectorAll('.slot-row').forEach(function(el) { el.remove(); });

        if (routine.length === 0) {
            empty.style.display = 'flex';
            return;
        }

        empty.style.display = 'none';

        routine.forEach(function(slot, i) {
            var row = document.createElement('div');
            row.className = 'slot-row';
            row.innerHTML =
                '<div class="slot-color-strip" style="background:' + color(i) + '"></div>' +
                '<div class="slot-details">' +
                    '<strong>' + slot.subject + '</strong>' +
                    '<span>' + slot.day + ' · ' + slot.time + (slot.room ? ' · ' + slot.room : '') + '</span>' +
                '</div>' +
                '<button class="slot-edit-btn" data-index="' + i + '" title="Edit slot">' +
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">' +
                '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>' +
                '<path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>' +
                '</svg>' +
                '</button>' +
                '<button class="slot-remove-btn" data-index="' + i + '">✕</button>';
            list.insertBefore(row, empty);
        });
    }

    var editingIndex = null;

    function openModal() {
        if (editingIndex === null) {
            document.getElementById('pick-subject').value = '';
            document.getElementById('pick-day').value = 'Monday';
            document.getElementById('pick-time').value = '';
            document.getElementById('room-no').value = '';
            document.getElementById('modal-title').textContent = 'Add Routine Slot';
            document.getElementById('save-slot-btn').textContent = 'Save Slot';
        }
        var el = document.getElementById('slot-modal');
        el.style.display = 'flex';
        setTimeout(function() { el.classList.add('visible'); }, 10);
    }

    function closeModal() {
        editingIndex = null;
        var el = document.getElementById('slot-modal');
        el.classList.remove('visible');
        setTimeout(function() { el.style.display = 'none'; }, 230);
    }

    function handleModalBackdrop(e) {
        if (e.target === document.getElementById('slot-modal')) closeModal();
    }

    function editSlot(index) {
        editingIndex = index;
        var slot = routine[index];
        document.getElementById('pick-subject').value = slot.subject;
        document.getElementById('pick-day').value = slot.day;
        document.getElementById('pick-time').value = slot.time;
        document.getElementById('room-no').value = slot.room || '';
        document.getElementById('modal-title').textContent = 'Edit Routine Slot';
        document.getElementById('save-slot-btn').textContent = 'Update Slot';
        openModal();
    }

    document.getElementById('open-modal-btn').onclick = openModal;
    document.getElementById('add-first-btn').onclick  = openModal;

    document.getElementById('save-slot-btn').onclick = function() {
        var subject = document.getElementById('pick-subject').value.trim();
        var day     = document.getElementById('pick-day').value;
        var time    = document.getElementById('pick-time').value;
        var room    = document.getElementById('room-no').value.trim();

        if (!subject || !time) {
            alert('Please enter a subject and set a time.');
            return;
        }

        if (editingIndex !== null) {
            routine[editingIndex] = { subject: subject, day: day, time: time, room: room };
            editingIndex = null;
        } else {
            routine.push({ subject: subject, day: day, time: time, room: room });
        }
        save();
        closeModal();
        renderSlots();
    };

    document.addEventListener('click', function(e) {
        var editBtn = e.target.closest('.slot-edit-btn');
        if (editBtn) {
            var idx = parseInt(editBtn.dataset.index);
            editSlot(idx);
            return;
        }

        var removeBtn = e.target.closest('[data-index].slot-remove-btn');
        if (removeBtn) {
            var idx = parseInt(removeBtn.dataset.index);
            routine.splice(idx, 1);
            save();
            renderSlots();
        }
    });

    /* sign out */
    function openSignoutPopup() {
        var el = document.getElementById('signout-overlay');
        el.style.display = 'flex';
        setTimeout(function() { el.classList.add('visible'); }, 10);
    }

    function closeSignoutPopup() {
        var el = document.getElementById('signout-overlay');
        el.classList.remove('visible');
        setTimeout(function() { el.style.display = 'none'; }, 230);
    }

    function handleSignoutBackdrop(e) {
        if (e.target === document.getElementById('signout-overlay')) closeSignoutPopup();
    }

    function doSignout() {
        window.location.href = '../index.html';
    }

    renderSlots();

</script>

</body>
</html>
